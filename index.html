<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Portfolio Rhevin</title>

  <link rel="stylesheet" href="style.css">

  <!-- TAMBAHAN STYLE ZOOM -->
  <style>
    /* Background modal */
    .img-modal{
      display:none;
      position:fixed;
      z-index:999;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
    }

    /* Gambar besar */
    .img-modal img{
      max-width:90%;
      max-height:90%;
      border-radius:10px;
      animation:zoomIn 0.3s ease;
    }

    /* Animasi zoom */
    @keyframes zoomIn{
      from{
        transform:scale(0.7);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    /* Cursor jadi klik */
    .profile-img{
      cursor:pointer;
    }
  </style>

</head>
<body>

  <!-- HEADER -->
  <header>

    <div class="header-text">
      <h1>Muhammad Rhevin Adilla</h1>
      <p>
        Asset Management |
        Preventive Maintenance |
        Fiber Optic |
        Antenna
      </p>
    </div>

    <div class="profile-container">
      <img
      src="2.jpeg"
      alt="Foto Profil"
      class="profile-img"
      onclick="openModal(this)">
    </div>

  </header>

  <!-- NAVBAR -->
  <nav>
</div>
    <a href="index.html">Home</a>
    <a href="About.html">About</a>
    <a href="skills.html">Skill</a>
    <a href="tools.html">Tools</a>
    <a href="experience.html">Experience</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h2>Beginner Telecommunication</h2>
    <p>“Connecting the Future Through Technology"</p>
  </section>

  <!-- MODAL IMAGE -->
  <div class="img-modal" id="imgModal" onclick="closeModal()">
    <img id="modalImg">
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Portfolio Rhevin</p>
  </footer>

  <!-- SCRIPT ZOOM -->
  <script>
    function openModal(img){
      document.getElementById("imgModal").style.display="flex";
      document.getElementById("modalImg").src=img.src;
    }

    function closeModal(){
      document.getElementById("imgModal").style.display="none";
    }
  </script>

</body>
</html>
